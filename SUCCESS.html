<!DOCTYPE html>
<html lang="en">
<head>
<title>Submission successfull</title>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

    <style>

        body{
           background:linear-gradient(135deg,#edf2f7,#e2e8f0,#cbd5e1);
background-attachment:fixed;
            font-family:Arial,sans-serif;
        }

        .success-box{

            width:600px;

            margin:120px auto;

            background:white;

            padding:50px;

            text-align:center;

            border-radius:15px;

            box-shadow:0 4px 20px rgba(0,0,0,0.15);
        }

        .tick{

            font-size:70px;

            color:green;
        }

        h1{

            color:#28a745;

            font-weight:bold;

            margin-top:15px;
        }

        p{

            font-size:18px;

            color:#555;

            margin-top:20px;

            line-height:30px;
        }

        .btn-home{

            margin-top:25px;

            background:#e63946;

            color:white;

            border:none;

            padding:12px 30px;

            font-size:16px;

            border-radius:8px;
        }

        .btn-home:hover{

            background:#c82333;

            color:white;
        }

    </style>

</head>

<body>

    <div class="success-box">

        <div class="tick">✓</div>

        <h1>Submission Successful!</h1>

        <p>

            Thank you for contacting <b>Sports Freak</b>.

            We have received your information successfully.

            Our team will get in touch with you soon.

        </p>

        <a href="index.html"
           class="btn btn-home">

           Back to Home

        </a>

    </div>

</body>
</html>
